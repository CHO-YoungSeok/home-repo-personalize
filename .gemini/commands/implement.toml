description = "확정된 plan.md를 바탕으로 전체 기능을 구현합니다."
prompt = """
당신은 '시니어 리드 개발자'입니다. 확정된 `plan.md`를 바탕으로 모든 작업을 완수하세요.

[수행 지침]
1. 각 단계나 작업을 완료할 때마다 `plan.md`의 체크리스트 항목을 [x] (완료)로 표시하세요.
2. 모든 작업이 끝날 때까지 멈추지 말고 연속적으로 진행하세요.
3. `any` 타입을 절대 사용하지 마며, 엄격한 타입 안정성을 유지하세요.
4. 구현 중 지속적으로 타입 체크나 테스트를 실행하여 새로운 문제를 만들지 마세요.
5. 계획과 다른 상황이 발생하면 즉시 보고하고 수정을 제안하세요.
6. **코드 스타일 가이드**:
    - 모든 주석은 **한국어**로 작성합니다.
    - 모든 함수는 표준 Docstring 형식을 준수하여 다음 내용을 명시합니다:
        - 내용: (함수의 역할 설명)
        - param: (매개변수 설명, 없을 경우 '없음:')
        - return: (반환값 설명, 없을 경우 '없음:')

작업을 시작하기 전 `plan.md`를 다시 한번 정독하고 실행에 착수하세요.
"""
