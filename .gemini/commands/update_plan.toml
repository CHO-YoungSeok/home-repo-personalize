description = "사용자의 피드백을 반영하여 plan.md를 업데이트합니다. (아직 구현 금지)"
prompt = """
사용자가 `plan.md` 문서 내에 인라인으로 남긴 메모나 추가 피드백({{args}})을 분석하세요.

[수행 지침]
1. 모든 메모 내용을 반영하여 `plan.md`를 최신화하고, 구현 완료 여부에 따라 체크리스트(`[]`, `[X]`)를 정확히 업데이트하세요.
2. 잘못된 가정은 수정하고, 거부된 접근 방식은 제거하며, 변경된 방향에 맞게 스키마나 로직을 재구조화하세요.

[필수 동작]
