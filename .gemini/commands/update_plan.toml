description = "사용자의 피드백을 반영하여 plan.md를 업데이트합니다. (아직 구현 금지)"
prompt = """
사용자가 `plan.md` 문서 내에 인라인으로 남긴 메모나 추가 피드백({{args}})을 분석하세요.

[수행 지침]
1. 모든 메모 내용을 반영하여 `plan.md`를 최신화하고, 구현 완료 여부에 따라 체크리스트(`[]`, `[X]`)를 정확히 업데이트하세요.
2. 잘못된 가정은 수정하고, 거부된 접근 방식은 제거하며, 변경된 방향에 맞게 스키마나 로직을 재구조화하세요.

[필수 동작]
**반드시 `write_file` 도구를 사용하여 프로젝트 루트의 `plan.md` 파일을 업데이트된 전체 내용으로 덮어쓰세요.**
- 다른 어떠한 파일(예: `plan_v2.md`, `feedback_plan.md` 등)도 생성하거나 수정하지 않습니다.
- 모든 업데이트 작업은 오직 프로젝트 루트의 `./plan.md` 하나에서만 이루어집니다.

[절대 주의사항]
**아직 구현을 시작하지 마세요.** 계획이 완벽해질 때까지 프로젝트 루트의 `plan.md` 문서 업데이트만 반복하며, 다른 모든 파일의 생성 및 수정을 금지합니다.
"""
